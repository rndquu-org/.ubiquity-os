          logLevel: info
          evmNetworkId: 100
          evmPrivateEncrypted: "123"
          erc20RewardToken: "0xe91D153E0b41518A2Ce8Dd3D7944Fa863463a97d"
          incentives:
            file: undefined
            requirePriceLabel: true
            contentEvaluator:
              openAi:
                model: gpt-4o-2024-08-06
                endpoint: https://api.openai.com/v1
              multipliers:
                - role:
                    - ISSUE_SPECIFICATION
                  relevance: 1
            userExtractor:
              redeemTask: true
            formattingEvaluator:
